<section id="view-riwayat" class="app-view">
    <div class="dashboard-card riwayat-card">
        
        <!-- Filters - Horizontal Layout -->
        <div class="filter-container">
            <div class="filter-search">
                <label>Cari Transaksi</label>
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="tx-search" placeholder="Cari ID transaksi, nama kasir...">
                </div>
            </div>
            
            <div class="filter-date">
                <label>Tanggal</label>
                <input type="date" id="tx-filter-date">
            </div>

            <!-- Dropdown Metode (Debit sudah dihapus) -->
            <div class="filter-method">
                <label>Metode</label>
                <select id="tx-filter-payment">
                    <option value="all">Semua</option>
                    <option value="Cash">Cash</option>
                    <option value="QRIS">QRIS</option>
                </select>
            </div>
            
            <button class="btn-reset-filter" id="btn-reset-tx-filters">
                <i class="fa-solid fa-rotate-left"></i> Reset
            </button>
        </div>
        
        <!-- History Table -->
        <div class="card-body">
            <div class="table-responsive">
                <table class="modern-table scrollable-table">
                    <thead>
                        <tr>
                            <th>ID Transaksi</th>
                            <th>Tanggal & Waktu</th>
                            <th>Nama Kasir</th>
                            <th>Total Pembayaran</th>
                            <th>Metode</th>
                            <th>Status</th>
                            <th style="text-align: center;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="history-transactions-tbody">
                        <!-- Dynamically injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
        
    </div>
</section>
